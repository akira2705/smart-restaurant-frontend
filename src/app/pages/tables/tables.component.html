<div class="tables-page">

  <h2>Table Availability</h2>

  <div *ngIf="loading">Loading tables...</div>

  <div class="table-grid">
    <mat-card
      *ngFor="let table of tables"
      class="table-card"
      [ngClass]="getStatusClass(table.status)"
    >
      <mat-card-title>Table #{{ table.id }}</mat-card-title>
      <mat-card-content>
        <p>Status: <strong>{{ table.status }}</strong></p>
        <p *ngIf="table.current_customer_id">
          Customer ID: {{ table.current_customer_id }}
        </p>
      </mat-card-content>
    </mat-card>
  </div>

</div>
